<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учим грузинский алфавит</title>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Pinia 3 -->
    <script src="https://unpkg.com/pinia@3/dist/pinia.iife.prod.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Georgian', 'Noto Sans', sans-serif;
            background-color: #ffffff;
        }
        .georgian-letter {
            font-size: 8rem;
            line-height: 1;
        }
        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.3s ease;
        }
        .fade-enter-from, .fade-leave-to {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Глобальный доступ к библиотекам через IIFE сборки
        const { createApp, computed } = Vue;
        const { createPinia, defineStore } = Pinia;

        // Константы алфавита (Мхедрули)
        const GEORGIAN_ALPHABET = [
            { letter: 'ა', trans: 'a', ru: 'а', mnemonic: 'Похожа на крючок с петелькой, как маленькая буква а на нитке.' },
            { letter: 'ბ', trans: 'b', ru: 'б', mnemonic: 'Напоминает русскую б, у которой нижняя часть стала круглой и открытой.' },
            { letter: 'გ', trans: 'g', ru: 'г', mnemonic: 'Похожа на гусиную шею: изогнулась и смотрит вправо.' },
            { letter: 'დ', trans: 'd', ru: 'д', mnemonic: 'Похожа на дольку или каплю с хвостиком.' },
            { letter: 'ე', trans: 'e', ru: 'э', mnemonic: 'Похожа на открытую скобку с язычком, как рот, говорящий э.' },
            { letter: 'ვ', trans: 'v', ru: 'в', mnemonic: 'Похожа на волну или маленькую веревочную петлю.' },
            { letter: 'ზ', trans: 'z', ru: 'з', mnemonic: 'Напоминает цифру 3, поэтому легко связать со звуком з.' },
            { letter: 'თ', trans: 't', ru: 'т', mnemonic: 'Похожа на круглый барабан, по которому стучат: т-т-т.' },
            { letter: 'ი', trans: 'i', ru: 'и', mnemonic: 'Похожа на тонкую иголку или вертикальную палочку.' },
            { letter: 'კ', trans: 'k\'', ru: 'к', mnemonic: 'Похожа на ключ с острым зубцом.' },
            { letter: 'ლ', trans: 'l', ru: 'л', mnemonic: 'Похожа на длинную ленту, которая загнулась вниз.' },
            { letter: 'მ', trans: 'm', ru: 'м', mnemonic: 'Похожа на мягкую волну с двумя бугорками, как буква м.' },
            { letter: 'ნ', trans: 'n', ru: 'н', mnemonic: 'Похожа на носик с маленьким изгибом.' },
            { letter: 'ო', trans: 'o', ru: 'о', mnemonic: 'Почти круглая, как овал или буква о.' },
            { letter: 'პ', trans: 'p\'', ru: 'п', mnemonic: 'Похожа на петлю с ножкой: петелька помогает вспомнить п.' },
            { letter: 'ჟ', trans: 'zh', ru: 'ж', mnemonic: 'Похожа на жука с усиком сверху.' },
            { letter: 'რ', trans: 'r', ru: 'р', mnemonic: 'Похожа на ручку или крючок, который рычит р-р-р.' },
            { letter: 'ს', trans: 's', ru: 'с', mnemonic: 'Похожа на след змейки, которая шипит с-с-с.' },
            { letter: 'ტ', trans: 't\'', ru: 'т', mnemonic: 'Похожа на тяжелый молоточек для резкого т.' },
            { letter: 'უ', trans: 'u', ru: 'у', mnemonic: 'Похожа на ушко или чашечку, куда звук у уходит вниз.' },
            { letter: 'ფ', trans: 'p', ru: 'п', mnemonic: 'Похожа на флажок на высокой стойке.' },
            { letter: 'ქ', trans: 'k', ru: 'к', mnemonic: 'Похожа на клюв птицы, который резко щелкает к.' },
            { letter: 'ღ', trans: 'gh', ru: 'г', mnemonic: 'Похожа на горлышко кувшина, для глубокого г.' },
            { letter: 'ყ', trans: 'q\'', ru: 'к', mnemonic: 'Похожа на крюк с острым нижним хвостом для твердого к.' },
            { letter: 'შ', trans: 'sh', ru: 'ш', mnemonic: 'Похожа на широкую щетку: шуршит ш-ш-ш.' },
            { letter: 'ჩ', trans: 'ch', ru: 'ч', mnemonic: 'Похожа на чашку с ручкой.' },
            { letter: 'ც', trans: 'ts', ru: 'ц', mnemonic: 'Похожа на цаплю на одной ноге.' },
            { letter: 'ძ', trans: 'dz', ru: 'дз', mnemonic: 'Похожа на зубчатый крючок: сначала д, потом з.' },
            { letter: 'წ', trans: 'ts\'', ru: 'ц', mnemonic: 'Похожа на цаплю с длинным клювом для резкого ц.' },
            { letter: 'ჭ', trans: 'ch\'', ru: 'ч', mnemonic: 'Похожа на чашку с высокой ручкой для резкого ч.' },
            { letter: 'ხ', trans: 'kh', ru: 'х', mnemonic: 'Похожа на раскрытую пасть, из которой выходит х.' },
            { letter: 'ჯ', trans: 'j', ru: 'дж', mnemonic: 'Похожа на джойстик с изогнутой ручкой.' },
            { letter: 'ჰ', trans: 'h', ru: 'х', mnemonic: 'Похожа на легкий выдох с хвостиком.' }
        ];

        // Инициализация Store
        const useGameStore = defineStore('game', {
            state: () => ({
                currentScreen: 'start', // 'start', 'letters', 'quiz', 'results'
                currentStep: 0,
                score: 0,
                totalSteps: 10,
                currentLetter: null,
                options: [],
                feedback: null,
                history: []
            }),
            actions: {
                startGame() {
                    this.currentScreen = 'quiz';
                    this.currentStep = 1;
                    this.score = 0;
                    this.history = [];
                    this.generateQuestion();
                },
                showLetters() {
                    this.currentScreen = 'letters';
                },
                generateQuestion() {
                    this.feedback = null;
                    const correctIdx = Math.floor(Math.random() * GEORGIAN_ALPHABET.length);
                    this.currentLetter = GEORGIAN_ALPHABET[correctIdx];
                    
                    let choices = [this.currentLetter.ru];
                    while (choices.length < 4) {
                        const randomIdx = Math.floor(Math.random() * GEORGIAN_ALPHABET.length);
                        const randomRu = GEORGIAN_ALPHABET[randomIdx].ru;
                        if (!choices.includes(randomRu)) {
                            choices.push(randomRu);
                        }
                    }
                    this.options = choices.sort(() => Math.random() - 0.5);
                },
                submitAnswer(selectedRu, event) {
                    if (this.feedback) return;

                    // Снимаем фокус с кнопки
                    if (event && event.currentTarget) {
                        event.currentTarget.blur();
                    }

                    const isCorrect = selectedRu === this.currentLetter.ru;
                    if (isCorrect) this.score++;
                    
                    this.feedback = { isCorrect, selected: selectedRu };
                    this.history.push({
                        letter: this.currentLetter.letter,
                        correct: this.currentLetter.ru,
                        selected: selectedRu,
                        isCorrect
                    });

                    setTimeout(() => {
                        if (this.currentStep < this.totalSteps) {
                            this.currentStep++;
                            this.generateQuestion();
                        } else {
                            this.currentScreen = 'results';
                        }
                    }, 1200);
                },
                resetGame() {
                    this.currentScreen = 'start';
                }
            }
        });

        // Главный компонент приложения
        const App = {
            template: `
                <div class="min-h-screen flex items-center justify-center p-4 bg-white text-black">
                    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-black/10">
                        
                        <!-- Экран 1: Старт -->
                        <div v-if="store.currentScreen === 'start'" class="p-8 text-center">
                            <div class="mb-6 text-6xl text-black font-bold drop-shadow-sm">ა ბ გ</div>
                            <h1 class="text-3xl font-bold text-black mb-4 tracking-tight">Грузинский Алфавит</h1>
                            <p class="text-black/60 mb-8 leading-relaxed">Изучайте буквы Мхедрули в игровой форме. Угадайте звучание 10 символов!</p>
                            <div class="space-y-3">
                                <button @click="store.startGame" class="w-full py-4 bg-black hover:bg-black/80 text-white rounded-2xl font-bold text-xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-black/10">
                                    Начать сессию
                                </button>
                                <button @click="store.showLetters" class="w-full py-3 border-2 border-black/10 hover:border-black/30 text-black rounded-2xl font-bold text-lg transition-all active:scale-95">
                                    Все буквы
                                </button>
                            </div>
                        </div>

                        <!-- Экран 2: Все буквы -->
                        <div v-if="store.currentScreen === 'letters'" class="p-6">
                            <div class="flex items-center justify-between mb-5">
                                <h2 class="text-2xl font-bold text-black tracking-tight">Все буквы</h2>
                                <button @click="store.resetGame" class="px-4 py-2 text-sm font-bold text-black/50 hover:text-black border border-black/10 rounded-xl transition-colors">
                                    Назад
                                </button>
                            </div>

                            <div class="max-h-[70vh] overflow-y-auto pr-1 space-y-3">
                                <div v-for="item in allLetters" :key="item.letter" class="flex gap-4 p-4 rounded-2xl border border-black/10 bg-black/[0.02]">
                                    <div class="w-14 shrink-0 text-center text-5xl font-bold leading-none text-black">
                                        {{ item.letter }}
                                    </div>
                                    <div class="min-w-0">
                                        <div class="mb-1 text-lg font-bold text-black">
                                            {{ item.ru }} <span class="text-sm font-medium text-black/35">/ {{ item.trans }}</span>
                                        </div>
                                        <p class="text-sm leading-relaxed text-black/60">
                                            {{ item.mnemonic }}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Экран 3: Тест -->
                        <div v-if="store.currentScreen === 'quiz'" class="p-6">
                            <div class="flex justify-between items-center mb-8">
                                <span class="text-xs font-bold uppercase tracking-wider text-black/40">Шаг {{ store.currentStep }} / {{ store.totalSteps }}</span>
                                <div class="h-2 w-32 bg-black/5 rounded-full overflow-hidden">
                                    <div class="h-full bg-black transition-all duration-500 ease-out" :style="{ width: (store.currentStep / store.totalSteps * 100) + '%' }"></div>
                                </div>
                                <span class="text-xs font-bold uppercase tracking-wider text-black/60">Верно: {{ store.score }}</span>
                            </div>

                            <div class="flex flex-col items-center mb-10 min-h-[220px] justify-center">
                                <transition name="fade" mode="out-in">
                                    <div :key="store.currentLetter.letter" class="georgian-letter font-bold text-black drop-shadow-md">
                                        {{ store.currentLetter.letter }}
                                    </div>
                                </transition>
                                <div class="h-8 mt-4">
                                    <transition name="fade">
                                        <p v-if="store.feedback" :class="store.feedback.isCorrect ? 'text-black' : 'text-black/40'" class="font-bold text-lg text-center">
                                            {{ store.feedback.isCorrect ? 'Правильно!' : 'Это звук «' + store.currentLetter.ru + '»' }}
                                        </p>
                                    </transition>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <button 
                                    v-for="opt in store.options" 
                                    :key="opt"
                                    @click="store.submitAnswer(opt, $event)"
                                    :disabled="!!store.feedback"
                                    :class="getButtonClass(opt)"
                                    class="py-5 px-4 rounded-2xl text-2xl font-semibold transition-all border-2 shadow-sm"
                                >
                                    {{ opt }}
                                </button>
                            </div>
                        </div>

                        <!-- Экран 4: Результаты -->
                        <div v-if="store.currentScreen === 'results'" class="p-8 text-center">
                            <h2 class="text-2xl font-bold text-black mb-2 uppercase tracking-tight">Ваш результат</h2>
                            <div class="text-7xl font-black text-black my-6 drop-shadow-sm">{{ store.score }}<span class="text-3xl text-black/20">/{{ store.totalSteps }}</span></div>
                            <p class="text-black/60 mb-8 font-medium">
                                {{ resultMessage }}
                            </p>
                            
                            <div class="max-h-48 overflow-y-auto mb-8 bg-black/[0.02] rounded-2xl p-4 text-left border border-black/5">
                                <div v-for="(h, idx) in store.history" :key="idx" class="flex items-center justify-between py-2 border-b last:border-0 border-black/5">
                                    <span class="text-2xl font-bold text-black">{{ h.letter }}</span>
                                    <div class="text-right">
                                        <span v-if="!h.isCorrect" class="text-xs text-black/40 mr-2 line-through">{{ h.selected }}</span>
                                        <span :class="h.isCorrect ? 'text-black' : 'text-black/60'" class="font-bold text-lg">
                                            {{ h.correct }}
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-3">
                                <button @click="store.startGame" class="w-full py-4 bg-black hover:bg-black/90 text-white rounded-2xl font-bold text-xl transition-all shadow-lg">
                                    Попробовать снова
                                </button>
                                <button @click="store.resetGame" class="w-full py-3 text-black/40 hover:text-black/60 font-bold uppercase text-xs tracking-widest">
                                    Вернуться в меню
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            `,
            setup() {
                const store = useGameStore();
                const allLetters = GEORGIAN_ALPHABET;

                const resultMessage = computed(() => {
                    const ratio = store.score / store.totalSteps;
                    if (ratio === 1) return "გაგიმარჯოს! Идеальный результат!";
                    if (ratio >= 0.7) return "Отлично! Вы почти запомнили алфавит.";
                    if (ratio >= 0.4) return "Хорошая попытка, продолжайте тренироваться.";
                    return "Не сдавайтесь! Грузинская письменность требует времени.";
                });

                const getButtonClass = (opt) => {
                    if (!store.feedback) {
                        return 'bg-white border-black/10 text-black hover:border-black/40 hover:text-black active:bg-black/[0.02]';
                    }
                    
                    if (opt === store.currentLetter.ru) {
                        return 'bg-black border-black text-white transform scale-[1.02]';
                    }
                    
                    if (store.feedback.selected === opt && !store.feedback.isCorrect) {
                        return 'bg-white border-black text-black';
                    }

                    return 'bg-black/[0.02] border-black/[0.02] text-black/20 opacity-60';
                };

                return { store, allLetters, resultMessage, getButtonClass };
            }
        };

        // Запуск приложения
        window.onload = () => {
            const app = createApp(App);
            const pinia = createPinia();
            app.use(pinia);
            app.mount('#app');
        };
    </script>
</body>
</html>
